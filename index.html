<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IP Patient Bystander Pass — Issue / Refund</title>
  <style>
    :root{
      --bg:#f6f8fb; --card:#ffffff; --accent:#2563eb; --muted:#6b7280; --danger:#dc2626; --success:#16a34a;
      --radius:12px; --pad:18px; font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,var(--bg),#eef2ff);padding:28px;color:#0f172a}
    .container{max-width:980px;margin:0 auto}
    header{display:flex;gap:16px;align-items:center;margin-bottom:18px}
    header h1{font-size:20px;margin:0}
    .card{background:var(--card);border-radius:var(--radius);padding:var(--pad);box-shadow:0 6px 18px rgba(16,24,40,0.06)}
    form .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input[type=text],input[type=date],input[type=datetime-local],input[type=number],select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #e6e9ef;background:#fff;font-size:14px}
    textarea{resize:vertical;min-height:80px}
    .full{grid-column:1/-1}
    .actions{display:flex;gap:10px;align-items:center;justify-content:flex-end;margin-top:14px}
    button{background:var(--accent);color:#fff;padding:10px 14px;border:0;border-radius:10px;cursor:pointer}
    button.secondary{background:#eef2ff;color:var(--accent);border:1px solid rgba(37,99,235,0.12)}
    button.ghost{background:transparent;color:var(--muted);border:1px dashed #e6e9ef}
    .status{display:inline-block;padding:6px 10px;border-radius:999px;font-size:13px}
    .status.issued{background:#eef2ff;color:var(--accent)}
    .status.refunded{background:#f0fdf4;color:var(--success)}
    .status.pending{background:#fff7ed;color:#92400e}
    .note{font-size:13px;color:var(--muted);margin-top:8px}
    .summary{margin-top:16px;padding:12px;border-radius:10px;border:1px dashed #e6e9ef;background:linear-gradient(180deg, #fcfffb, #fff)}
    .row{display:flex;gap:12px;align-items:center}
    @media (max-width:820px){.grid{grid-template-columns:1fr}.actions{flex-direction:column;align-items:stretch}}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="card" style="padding:10px 14px;border-radius:10px">
        <strong>IP Bystander Pass</strong>
      </div>
      <div>
        <h1>Issue / Refund - Patient Bystander Pass</h1>
        <div class="note">Issue a temporary bystander pass for in-patient (IP) visitors; collect a refundable deposit and refund at discharge.</div>
      </div>
    </header>

    <form id="passForm" class="card" onsubmit="return false;">
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;align-items:center">
        <div style="flex:1 1 220px">
          <label>Pass ID</label>
          <input type="text" id="passId" readonly />
        </div>
        <div style="flex:1 1 220px">
          <label>Issue Date &amp; Time</label>
          <input type="datetime-local" id="issueDt" />
        </div>
        <div style="flex:1 1 160px">
          <label>Status</label>
          <div id="statusBadge" class="status pending">Not issued</div>
        </div>
      </div>

      <section style="margin-bottom:12px">
        <h3 style="margin:0 0 10px 0;font-size:15px">Patient details</h3>
        <div class="grid">
          <div>
            <label for="patientName">Patient name</label>
            <input id="patientName" type="text" required />
          </div>
          <div>
            <label for="patientWard">Ward / Room</label>
            <input id="patientWard" type="text" />
          </div>

          <div>
            <label for="patientOpd">IP / MRN No.</label>
            <input id="patientOpd" type="text" />
          </div>
          <div>
            <label for="patientPhone">Patient phone</label>
            <input id="patientPhone" type="text" />
          </div>
        </div>
      </section>

      <section>
        <h3 style="margin:0 0 10px 0;font-size:15px">Bystander / Visitor details</h3>
        <div class="grid">
          <div>
            <label for="visitorName">Bystander name</label>
            <input id="visitorName" type="text" required />
          </div>
          <div>
            <label for="visitorRelation">Relation to patient</label>
            <input id="visitorRelation" type="text" />
          </div>

          <div>
            <label for="visitorIdType">ID type</label>
            <select id="visitorIdType">
              <option>Government ID</option>
              <option>Passport</option>
              <option>Aadhaar</option>
              <option>Other</option>
            </select>
          </div>
          <div>
            <label for="visitorIdNo">ID number</label>
            <input id="visitorIdNo" type="text" />
          </div>

          <div class="full">
            <label for="visitorAddr">Address</label>
            <textarea id="visitorAddr"></textarea>
          </div>
        </div>
      </section>

      <section style="margin-top:12px">
        <h3 style="margin:0 0 10px 0;font-size:15px">Financials</h3>
        <div class="grid">
          <div>
            <label for="amount">Refundable deposit amount (₹)</label>
            <input id="amount" type="number" min="0" step="0.01" value="500" required />
          </div>
          <div>
            <label for="collected">Amount collected (₹)</label>
            <input id="collected" type="number" min="0" step="0.01" value="0" />
          </div>

          <div>
            <label>Payment status</label>
            <select id="paymentStatus">
              <option value="not">Not collected</option>
              <option value="collected">Collected</option>
            </select>
          </div>

          <div>
            <label for="collectedBy">Collected by (staff)</label>
            <input id="collectedBy" type="text" />
          </div>

          <div>
            <label for="dischargeDt">Expected discharge</label>
            <input id="dischargeDt" type="datetime-local" />
          </div>

          <div>
            <label for="refundStatus">Refund status</label>
            <select id="refundStatus">
              <option value="not">Not refunded</option>
              <option value="refunded">Refunded</option>
            </select>
          </div>

          <div>
            <label for="refundAmt">Refund amount (₹)</label>
            <input id="refundAmt" type="number" min="0" step="0.01" value="0" />
          </div>

          <div>
            <label for="refundBy">Refunded by (staff)</label>
            <input id="refundBy" type="text" />
          </div>

          <div>
            <label for="refundDt">Refund date &amp; time</label>
            <input id="refundDt" type="datetime-local" />
          </div>
        </div>
      </section>

      <div class="actions">
        <button type="button" id="issueBtn">Issue Pass</button>
        <button class="secondary" id="collectBtn" type="button">Mark Collected</button>
        <button class="secondary" id="refundBtn" type="button">Process Refund</button>
        <button class="ghost" id="printBtn" type="button">Print / Save</button>
      </div>

      <div class="summary" id="summaryBox" aria-live="polite">
        <strong>Summary</strong>
        <div id="summaryText" style="margin-top:8px;color:var(--muted)">No pass issued yet.</div>
      </div>
    </form>
  </div>

  <script>
    // utility
    const $ = id => document.getElementById(id);
    function uid(len=6){return 'BP-'+Math.random().toString(36).slice(2,2+len).toUpperCase()}

    // initial setup
    $('passId').value = uid(6);
    $('issueDt').value = new Date().toISOString().slice(0,16);

    function updateSummary(){
      const s = [];
      s.push(`<strong>Pass ID:</strong> ${$('passId').value}`);
      s.push(`<strong>Patient:</strong> ${$('patientName').value || '—'} (${$('patientOpd').value||'—'})`);
      s.push(`<strong>Bystander:</strong> ${$('visitorName').value || '—'} — ${$('visitorRelation').value||'—'}`);
      s.push(`<strong>Deposit:</strong> ₹${Number($('amount').value||0).toFixed(2)} | Collected: ₹${Number($('collected').value||0).toFixed(2)}`);
      s.push(`<strong>Payment:</strong> ${$('paymentStatus').value}`);
      s.push(`<strong>Refund:</strong> ${$('refundStatus').value} ${$('refundStatus').value==='refunded'?('(₹'+Number($('refundAmt').value||0).toFixed(2)+')'):''}`);
      s.push(`<strong>Issued:</strong> ${$('issueDt').value||'—'}`);
      s.push(`<strong>Discharge (expected):</strong> ${$('dischargeDt').value||'—'}`);
      $('summaryText').innerHTML = s.join('<br>');
    }

    // buttons actions
    $('issueBtn').addEventListener('click', ()=>{
      // validate minimal
      if(!$('patientName').value.trim() || !$('visitorName').value.trim()){
        alert('Please fill patient and bystander name before issuing.'); return;
      }
      // mark issued
      $('statusBadge').textContent = 'Issued';
      $('statusBadge').className = 'status issued';
      if(!$('issueDt').value) $('issueDt').value = new Date().toISOString().slice(0,16);
      updateSummary();
      alert('Pass issued. Collect refundable deposit if required.');
    });

    $('collectBtn').addEventListener('click', ()=>{
      const amt = parseFloat($('amount').value) || 0;
      if(amt <= 0){ alert('Please set a refundable amount > 0.'); return; }
      $('collected').value = amt.toFixed(2);
      $('paymentStatus').value = 'collected';
      $('collectedBy').focus();
      updateSummary();
      alert('Marked as collected (this simulates payment).');
    });

    $('refundBtn').addEventListener('click', ()=>{
      const collected = parseFloat($('collected').value) || 0;
      if(collected <= 0){ alert('No amount collected to refund.'); return; }
      // default refund amount: collected
      $('refundAmt').value = collected.toFixed(2);
      $('refundStatus').value = 'refunded';
      $('refundDt').value = new Date().toISOString().slice(0,16);
      $('statusBadge').textContent = 'Refunded';
      $('statusBadge').className = 'status refunded';
      updateSummary();
      alert('Refund processed (simulated). Please ensure actual cash/transaction is done at billing.');
    });

    $('printBtn').addEventListener('click', ()=>{
      window.print();
    });

    // live updates
    ['patientName','visitorName','amount','collected','paymentStatus','refundStatus','refundAmt','issueDt','dischargeDt'].forEach(id=>{
      $(id).addEventListener('input', updateSummary);
    });

    // initial summary render
    updateSummary();
  </script>
</body>
</html>
